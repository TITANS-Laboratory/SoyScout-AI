<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoyScout AI — Interactive Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --earth: #2C1810;
  --soil: #3E2723;
  --green-900: #1B5E20;
  --green-700: #2E7D32;
  --green-500: #43A047;
  --green-300: #81C784;
  --green-100: #C8E6C9;
  --green-50: #E8F5E9;
  --gold-700: #F57F17;
  --gold-500: #F9A825;
  --gold-300: #FDD835;
  --gold-50: #FFF8E1;
  --rust: #BF5B21;
  --rust-deep: #E65100;
  --red-700: #D32F2F;
  --red-50: #FFEBEE;
  --cream: #FFF8E1;
  --warm-white: #FFFDF7;
  --warm-gray: #F5F0E8;
  --text-primary: #1B1108;
  --text-secondary: #5D4E37;
  --text-muted: #8D7B65;
  --border-light: #E8E0D4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  color: var(--text-primary);
  background: linear-gradient(145deg, var(--warm-gray) 0%, var(--warm-white) 50%, var(--green-50) 100%);
  min-height: 100vh;
  padding: 24px 16px;
}

.app { max-width: 500px; margin: 0 auto; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--green-700), var(--green-500));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 14px rgba(46,125,50,0.35);
  transform: rotate(-5deg);
}

.logo-title { font-family: 'Bitter', serif; font-weight: 700; font-size: 19px; color: var(--text-primary); }
.logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; }

.demo-badge {
  background: var(--gold-50);
  border: 1px solid var(--gold-500);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-700);
  letter-spacing: 0.04em;
}

/* Region selector */
.region-bar { display: flex; gap: 8px; margin-bottom: 16px; }

.region-btn {
  flex: 1;
  padding: 9px 4px;
  border-radius: 10px;
  border: 1px solid var(--border-light);
  background: white;
  color: var(--text-muted);
  font-family: inherit;
  font-weight: 400;
  font-size: 12.5px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: capitalize;
}

.region-btn.active {
  border: 2px solid var(--green-700);
  background: var(--green-50);
  color: var(--green-700);
  font-weight: 600;
}

/* Growth stage track */
.stage-panel {
  background: white;
  border-radius: 16px;
  padding: 16px 12px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.04);
}

.stage-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.stage-track {
  display: flex;
  position: relative;
  gap: 0;
}

.stage-rail {
  position: absolute;
  top: 14px;
  left: 16px;
  right: 16px;
  height: 3px;
  background: var(--border-light);
  border-radius: 2px;
  z-index: 0;
}

.stage-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--green-700), var(--green-500), var(--gold-500));
  border-radius: 2px;
  transition: width 0.4s ease;
}

.stage-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 1px;
  position: relative;
  z-index: 1;
}

.stage-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--border-light);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stage-dot.past {
  background: var(--green-100);
  border-color: #A5D6A7;
}

.stage-dot.active {
  width: 30px; height: 30px;
  border-width: 3px;
  box-shadow: 0 0 0 4px rgba(46,125,50,0.15);
}

.stage-dot.active::after {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: white;
}

.stage-id {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  transition: all 0.3s;
}

.stage-id.active {
  font-weight: 700;
}

/* Stage header */
.stage-header {
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.stage-header h2 {
  font-family: 'Bitter', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.stage-header-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

.scan-btn {
  background: linear-gradient(135deg, var(--green-700), var(--green-500));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 14px rgba(46,125,50,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}

.scan-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 22px rgba(46,125,50,0.4);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  background: white;
  border-radius: 14px;
  padding: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.tab-btn {
  flex: 1;
  padding: 10px 4px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: inherit;
  font-weight: 400;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--green-700);
  color: white;
  font-weight: 600;
}

/* Content panel */
.content-panel {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.04);
  margin-bottom: 20px;
  min-height: 200px;
}

.panel-title {
  font-family: 'Bitter', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 14px;
}

/* Scouting cards */
.scout-card {
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border-left: 4px solid;
}

.scout-card.high { background: var(--red-50); border-left-color: var(--red-700); }
.scout-card.medium { background: var(--gold-50); border-left-color: var(--gold-700); }
.scout-card.low { background: var(--green-50); border-left-color: var(--green-700); }

.scout-priority {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

.scout-card.high .scout-priority { color: var(--red-700); }
.scout-card.medium .scout-priority { color: var(--gold-700); }
.scout-card.low .scout-priority { color: var(--green-700); }

.scout-item { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.scout-action { font-size: 12px; color: var(--text-secondary); }

/* Disease cards */
.disease-card {
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}

.disease-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 8px;
}

.disease-name { font-family: 'Bitter', serif; font-size: 15px; font-weight: 700; color: var(--text-primary); }

.risk-badge {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
}

.risk-badge.high { background: var(--red-50); color: var(--red-700); }
.risk-badge.medium { background: var(--gold-50); color: var(--gold-700); }
.risk-badge.low { background: var(--green-50); color: var(--green-700); }
.risk-badge.planning { background: #E3F2FD; color: #1565C0; }

.disease-region { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.disease-symptoms { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* Nutrient cards */
.nutrient-card {
  background: #F9FBF7;
  border: 1px solid var(--green-100);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
}

.nutrient-name { font-family: 'Bitter', serif; font-size: 15px; font-weight: 700; color: var(--green-700); margin-bottom: 8px; }
.nutrient-note { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }

.nutrient-cost {
  background: var(--green-50);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--green-900);
  font-weight: 500;
}

/* Economics */
.econ-intro { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }

.acreage-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.acreage-label { font-family: 'Bitter', serif; font-size: 14px; color: var(--text-secondary); }

.acreage-slider {
  flex: 1;
  min-width: 120px;
  accent-color: var(--green-700);
  height: 6px;
}

.acreage-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 700;
  font-size: 16px;
  color: var(--green-700);
  background: var(--green-50);
  padding: 4px 14px;
  border-radius: 8px;
  min-width: 90px;
  text-align: center;
}

.econ-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border-light);
}

.econ-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}

.econ-action { font-weight: 600; font-size: 14px; color: var(--text-primary); flex: 1; }

.econ-cost-per-acre {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--rust);
  font-weight: 600;
  white-space: nowrap;
}

.econ-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.econ-metric {
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
}

.econ-metric.cost { background: var(--gold-50); }
.econ-metric.benefit { background: var(--green-50); }
.econ-metric.roi { background: #F3E5F5; }

.econ-metric-label { color: var(--text-muted); margin-bottom: 2px; font-size: 11px; }
.econ-metric.cost .econ-metric-value { font-weight: 700; color: var(--rust); font-family: 'IBM Plex Mono', monospace; }
.econ-metric.benefit .econ-metric-value { font-weight: 600; color: var(--green-700); font-size: 11px; }
.econ-metric.roi .econ-metric-value { font-weight: 600; color: #6A1B9A; font-size: 11px; }

/* AI Scanner overlay */
.ai-overlay {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 4px 28px rgba(0,0,0,0.1);
  border: 1px solid rgba(0,0,0,0.04);
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.ai-scan-area {
  width: 200px; height: 200px;
  border-radius: 20px;
  background: var(--earth);
  margin: 0 auto 20px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.scan-line {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--green-500);
  box-shadow: 0 0 20px var(--green-500);
  animation: scanMove 1.5s ease-in-out infinite;
}

@keyframes scanMove {
  0% { top: 0; }
  50% { top: calc(100% - 4px); }
  100% { top: 0; }
}

.scan-status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--green-50);
  border-radius: 100px;
  padding: 10px 22px;
}

.scan-spinner {
  width: 18px; height: 18px;
  border: 3px solid var(--green-700);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.scan-text { font-weight: 600; color: var(--green-700); font-size: 14px; }

/* AI Result */
.ai-result-header {
  background: linear-gradient(135deg, var(--green-900), var(--green-700));
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ai-result-header span { color: white; font-weight: 600; font-size: 14px; }

.ai-close-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.2s;
}

.ai-close-btn:hover { background: rgba(255,255,255,0.3); }

.ai-result-body { padding: 20px; }

.ai-result-top { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }

.ai-result-info { flex: 1; min-width: 180px; }

.ai-result-name { font-family: 'Bitter', serif; font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }

.ai-badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

.ai-badge {
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
}

.ai-badge.confidence { background: var(--green-50); color: var(--green-700); }
.ai-badge.severity-early { background: var(--gold-50); color: var(--gold-700); }
.ai-badge.severity-moderate { background: var(--red-50); color: var(--red-700); }

.ai-result-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

.ai-action-box {
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.ai-action-box.action { background: var(--green-50); }
.ai-action-box.economic { background: var(--gold-50); }

.ai-action-label {
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.ai-action-box.action .ai-action-label { color: var(--green-900); }
.ai-action-box.economic .ai-action-label { color: var(--gold-700); }

.ai-action-text { font-size: 13px; line-height: 1.65; }
.ai-action-box.action .ai-action-text { color: var(--green-700); }
.ai-action-box.economic .ai-action-text { color: var(--text-secondary); }

/* Leaf SVG in scan */
.leaf-svg { border-radius: 12px; }

/* Footer */
.app-footer {
  text-align: center;
  padding: 14px 16px;
  background: rgba(46,125,50,0.06);
  border-radius: 12px;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.7;
}

.app-footer strong { color: var(--green-700); }

/* Responsive */
@media (max-width: 400px) {
  .econ-metrics { grid-template-columns: 1fr; }
  .ai-result-top { flex-direction: column; }
}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>

// ──────────────── STATE ────────────────

let state = {
  stage: "R1",
  tab: "scout",
  region: "southern",
  screen: "main", // main | scanning | result
  aiResult: null,
  acres: 500,
};

// ──────────────── LEAF SVG BUILDER ────────────────

function leafSVG(pattern, size) {
  const palettes = {
    sds:     { bg:"#4a7c59", leaf:"#5C8A4D", vein:"#2E5339", spots:'<ellipse cx="70" cy="65" rx="12" ry="8" fill="#8B7332" opacity="0.8"/><ellipse cx="110" cy="80" rx="10" ry="14" fill="#8B7332" opacity="0.7"/><ellipse cx="80" cy="105" rx="14" ry="9" fill="#6B5322" opacity="0.6"/>' },
    frogeye: { bg:"#4a7c59", leaf:"#5C8A4D", vein:"#2E5339", spots:'<circle cx="72" cy="62" r="9" fill="#8D8D8D" stroke="#4E342E" stroke-width="2"/><circle cx="108" cy="78" r="7" fill="#9E9E9E" stroke="#4E342E" stroke-width="2"/><circle cx="85" cy="100" r="10" fill="#8D8D8D" stroke="#4E342E" stroke-width="2"/><circle cx="100" cy="55" r="6" fill="#9E9E9E" stroke="#4E342E" stroke-width="2"/>' },
    idc:     { bg:"#C5B358", leaf:"#D4C56A", vein:"#4a7c59", spots:'<line x1="90" y1="30" x2="90" y2="145" stroke="#4a7c59" stroke-width="3"/>' },
  };
  const p = palettes[pattern] || palettes.sds;
  const veins = [40,60,80,100,120].map((y,i) =>
    `<line x1="90" y1="${y}" x2="${55+i*2}" y2="${y-8}" stroke="${p.vein}" stroke-width="1.5" opacity="0.7"/>` +
    `<line x1="90" y1="${y}" x2="${125-i*2}" y2="${y-8}" stroke="${p.vein}" stroke-width="1.5" opacity="0.7"/>`
  ).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 180 180" class="leaf-svg">
    <rect width="180" height="180" fill="${p.bg}" rx="16"/>
    <ellipse cx="90" cy="85" rx="55" ry="65" fill="${p.leaf}"/>
    <line x1="90" y1="30" x2="90" y2="145" stroke="${p.vein}" stroke-width="2.5"/>
    ${veins}${p.spots}
    <rect x="130" y="140" width="38" height="28" rx="6" fill="rgba(0,0,0,0.5)"/>
    <circle cx="149" cy="152" r="8" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="149" cy="152" r="3" fill="white" opacity="0.8"/>
  </svg>`;
}

// ──────────────── RENDER ────────────────

function render() {
  const data = STAGE_DATA[state.stage];
  const stageIdx = STAGES.findIndex(s => s.id === state.stage);
  const stageObj = STAGES[stageIdx];
  const progress = (stageIdx / (STAGES.length - 1)) * 100;

  let html = '';

  // Header
  html += `
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">🌱</div>
      <div><div class="logo-title">SoyScout AI</div><div class="logo-sub">INTERACTIVE DEMO</div></div>
    </div>
    <div class="demo-badge">DEMO MODE</div>
  </div>`;

  // Region
  html += `<div class="region-bar">`;
  ["southern","central","northern"].forEach(r => {
    html += `<button class="region-btn${state.region===r?' active':''}" onclick="setState({region:'${r}'})">${r.charAt(0).toUpperCase()+r.slice(1)} IL</button>`;
  });
  html += `</div>`;

  // Stage track
  html += `<div class="stage-panel"><div class="stage-label">Growth Stage</div><div class="stage-track">`;
  html += `<div class="stage-rail"><div class="stage-progress" style="width:${progress}%"></div></div>`;
  STAGES.forEach((s, i) => {
    const isActive = s.id === state.stage;
    const isPast = stageIdx >= i;
    let dotClass = 'stage-dot';
    if (isActive) dotClass += ' active';
    else if (isPast) dotClass += ' past';
    const dotStyle = isActive ? `background:${s.color};border-color:${s.color};` : '';
    const idClass = 'stage-id' + (isActive ? ' active' : '');
    const idStyle = isActive ? `color:${s.color};` : '';
    html += `<button class="stage-btn" onclick="setState({stage:'${s.id}',tab:'scout',screen:'main'})">
      <div class="${dotClass}" style="${dotStyle}"></div>
      <span class="${idClass}" style="${idStyle}">${s.id}</span>
    </button>`;
  });
  html += `</div></div>`;

  // ── SCANNING SCREEN ──
  if (state.screen === 'scanning') {
    html += `<div class="ai-overlay" style="padding:24px;text-align:center;">
      <div class="ai-scan-area">
        <div class="scan-line"></div>
        ${leafSVG('sds', 160)}
      </div>
      <div class="scan-status">
        <div class="scan-spinner"></div>
        <span class="scan-text">Analyzing leaf image...</span>
      </div>
    </div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  // ── AI RESULT SCREEN ──
  if (state.screen === 'result' && state.aiResult) {
    const r = state.aiResult;
    const sevClass = r.severity === 'Early' ? 'severity-early' : 'severity-moderate';
    html += `<div class="ai-overlay">
      <div class="ai-result-header">
        <span>🔬 AI Identification Result</span>
        <button class="ai-close-btn" onclick="setState({screen:'main'})">✕ Close</button>
      </div>
      <div class="ai-result-body">
        <div class="ai-result-top">
          ${leafSVG(r.pattern, 120)}
          <div class="ai-result-info">
            <div class="ai-result-name">${r.name}</div>
            <div class="ai-badges">
              <span class="ai-badge confidence">${r.confidence}% confidence</span>
              <span class="ai-badge ${sevClass}">${r.severity} severity</span>
            </div>
            <div class="ai-result-desc">${r.desc}</div>
          </div>
        </div>
        <div class="ai-action-box action">
          <div class="ai-action-label">✅ Recommended Action</div>
          <div class="ai-action-text">${r.action}</div>
        </div>
        <div class="ai-action-box economic">
          <div class="ai-action-label">💰 Economic Impact</div>
          <div class="ai-action-text">${r.economic}</div>
        </div>
      </div>
    </div>`;
  }

  // ── MAIN SCREEN ──
  if (state.screen === 'main' || state.screen === 'result') {

    // Stage header
    html += `<div class="stage-header" style="background:linear-gradient(135deg,${stageObj.color}22,white);border:1px solid ${stageObj.color}33;">
      <div>
        <h2>${data.title}</h2>
        <div class="stage-header-meta">${stageObj.week} · ${state.region.charAt(0).toUpperCase()+state.region.slice(1)} Illinois</div>
      </div>
      <button class="scan-btn" onclick="startScan()">📸 Scan Leaf</button>
    </div>`;

    // Tabs
    const tabs = [
      {id:"scout",label:"📋 Scout"},{id:"disease",label:"🦠 Disease"},{id:"nutrient",label:"🧪 Nutrients"},{id:"econ",label:"💰 ROI"}
    ];
    html += `<div class="tabs">`;
    tabs.forEach(t => {
      html += `<button class="tab-btn${state.tab===t.id?' active':''}" onclick="setState({tab:'${t.id}'})">${t.label}</button>`;
    });
    html += `</div>`;

    // Content
    html += `<div class="content-panel">`;

    if (state.tab === 'scout') {
      html += `<div class="panel-title">Scouting Priorities</div>`;
      data.scouting.forEach(s => {
        html += `<div class="scout-card ${s.priority}">
          <div class="scout-priority">${s.priority} priority</div>
          <div class="scout-item">${s.item}</div>
          <div class="scout-action">→ ${s.action}</div>
        </div>`;
      });
    }

    else if (state.tab === 'disease') {
      html += `<div class="panel-title">Disease Watch — ${state.region.charAt(0).toUpperCase()+state.region.slice(1)} IL</div>`;
      data.diseases.forEach(d => {
        let riskClass = 'medium';
        if (d.risk.includes('High')) riskClass = 'high';
        else if (d.risk.includes('Low')) riskClass = 'low';
        else if (d.risk === 'Planning') riskClass = 'planning';
        html += `<div class="disease-card">
          <div class="disease-header">
            <span class="disease-name">${d.name}</span>
            <span class="risk-badge ${riskClass}">Risk: ${d.risk}</span>
          </div>
          <div class="disease-region">📍 ${d.region}</div>
          <div class="disease-symptoms"><strong>Symptoms:</strong> ${d.symptoms}</div>
        </div>`;
      });
    }

    else if (state.tab === 'nutrient') {
      html += `<div class="panel-title">Nutrient Management</div>`;
      data.nutrients.forEach(n => {
        html += `<div class="nutrient-card">
          <div class="nutrient-name">${n.nutrient}</div>
          <div class="nutrient-note">${n.note}</div>
          <div class="nutrient-cost">💰 ${n.costBenefit}</div>
        </div>`;
      });
    }

    else if (state.tab === 'econ') {
      html += `<div class="panel-title">Per-Acre Economics</div>`;
      html += `<div class="econ-intro">Adjust your acreage to see projected costs and returns for each management decision at this growth stage.</div>`;
      html += `<div class="acreage-control">
        <span class="acreage-label">Your acreage:</span>
        <input type="range" class="acreage-slider" min="50" max="5000" step="50" value="${state.acres}" oninput="setState({acres:Number(this.value)})">
        <span class="acreage-value">${state.acres.toLocaleString()} ac</span>
      </div>`;
      data.economics.forEach(d => {
        const total = d.costPerAcre * state.acres;
        html += `<div class="econ-card">
          <div class="econ-header">
            <span class="econ-action">${d.action}</span>
            <span class="econ-cost-per-acre">$${d.costPerAcre}/acre</span>
          </div>
          <div class="econ-metrics">
            <div class="econ-metric cost">
              <div class="econ-metric-label">Total Cost</div>
              <div class="econ-metric-value">$${total.toLocaleString()}</div>
            </div>
            <div class="econ-metric benefit">
              <div class="econ-metric-label">Benefit Est.</div>
              <div class="econ-metric-value">${d.expectedBenefit}</div>
            </div>
            <div class="econ-metric roi">
              <div class="econ-metric-label">ROI</div>
              <div class="econ-metric-value">${d.roi}</div>
            </div>
          </div>
        </div>`;
      });
    }

    html += `</div>`; // end content-panel
  }

  // Footer
  html += `<div class="app-footer">
    <strong>SoyScout AI Demo</strong> — This is a prototype demonstrating the proposed tool's functionality.
    Data shown is representative and based on published Illinois extension recommendations.<br>
    SIU Carbondale · Khalil · ISA FY27 Proposal
  </div>`;

  document.getElementById('app').innerHTML = html;
}

// ──────────────── STATE MANAGEMENT ────────────────

function setState(partial) {
  Object.assign(state, partial);
  render();
}

function startScan() {
  setState({ screen: 'scanning' });
  setTimeout(() => {
    const result = AI_RESULTS[Math.floor(Math.random() * AI_RESULTS.length)];
    setState({ screen: 'result', aiResult: result });
  }, 2500);
}

// ──────────────── INIT ────────────────

render();
</script>
